<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codenergy — 배틀 진행</title>
    <style>
      .page-fade {
        position: fixed; inset: 0; background: #fff;
        z-index: 9999; opacity: 1; pointer-events: auto;
      }
    </style>
    <link
      rel="stylesheet"
      data-name="vs/editor/editor.main"
      href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css"
    />
    <script type="module" crossorigin src="/assets/battleMatch-DoLDlvyo.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/main-BcjvKVtr.js">
    <link rel="stylesheet" crossorigin href="/assets/main-Cgxa36ng.css">
  </head>
  <body>
    <div class="page-fade" id="page-fade"></div>

    <header class="nav">
      <div class="logo"><a href="index.html">Codenergy ▲</a></div>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false" aria-controls="nav-collapse">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-collapse" id="nav-collapse">
        <nav class="menu" id="menu">
          <a href="codetrails.html" data-i18n="nav.codetrail">코드트레일</a>
          <a href="pricing.html" data-i18n="nav.pricing">요금제</a>
        </nav>
        <div class="actions">
          <div class="lang-wrap" id="lang-wrap">
            <button class="ghost" id="lang-btn" type="button">🌐 <span id="lang-current">한국어</span> ▾</button>
            <div class="lang-menu" id="lang-menu" hidden>
              <button type="button" class="lang-menu__item" data-lang="ko">한국어</button>
              <button type="button" class="lang-menu__item" data-lang="en">English</button>
            </div>
          </div>
          <div class="notif-wrap" id="notif-wrap">
            <button class="icon" id="notif-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="알림">🔔</button>
            <div class="notif-menu" id="notif-menu" hidden>
              <div class="notif-menu__header">알림</div>
              <ul class="notif-menu__list" id="notif-list"></ul>
              <p class="notif-menu__empty" id="notif-empty" hidden>새 알림이 없어요</p>
              <p class="notif-menu__signin" id="notif-signin" hidden>로그인 후 확인할 수 있어요</p>
            </div>
          </div>
          <button class="ghost" id="login-btn" data-i18n="action.login">로그인</button>
          <button class="ghost" id="signup-btn" data-i18n="action.signup">회원가입</button>
          <div class="my-wrap" id="my-wrap" hidden>
            <button class="ghost" id="my-btn" data-i18n="action.my">My</button>
            <div class="my-menu" id="my-menu" hidden>
              <div class="my-menu__profile">
                <div class="my-menu__avatar" aria-hidden="true">👤</div>
                <div class="my-menu__user">
                  <div class="my-menu__name" id="my-name">사용자</div>
                  <div class="my-menu__email" id="my-email">user@example.com</div>
                </div>
              </div>
              <button type="button" class="my-menu__item my-menu__logout" id="logout-btn">로그아웃</button>
            </div>
          </div>
          <button class="cta">학습하기 →</button>
        </div>
      </div>
    </header>

    <div id="auth-modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <form class="modal-card" id="auth-form">
        <h3 id="modal-title">로그인</h3>
        <label class="field-username"><span>아이디</span><input name="username" required minlength="2" /></label>
        <label class="field-password"><span>비밀번호</span><input name="password" type="password" required minlength="6" /></label>
        <label class="field-email" id="email-field" hidden><span>Gmail</span><input name="email" type="email" /></label>
        <p class="modal-info" id="modal-info" hidden></p>
        <p class="modal-error" id="modal-error" hidden></p>
        <div class="modal-recovery" id="modal-recovery">
          <button type="button" class="link-button" id="find-id-btn">아이디 찾기</button>
          <button type="button" class="link-button" id="find-password-btn">비밀번호 찾기</button>
        </div>
        <div class="modal-recovery-alt" id="modal-recovery-alt" hidden>
          <button type="button" class="link-button" id="alt-find-id-btn">아이디 찾기</button>
          <button type="button" class="link-button" id="alt-find-password-btn">비밀번호 찾기</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="ghost" data-close>취소</button>
          <button type="submit" class="cta" id="submit-btn">로그인</button>
        </div>
      </form>
    </div>

    <!-- 3행 grid 배틀 메인 -->
    <main class="battle-match">

      <!-- 1행: 문제 영역 -->
      <section class="battle-problem" aria-label="문제">
        <h1 class="battle-problem__h1" id="battle-problem-title">준비중입니다...</h1>
        <div class="battle-problem__body" id="battle-problem-body"></div>
        <div class="battle-problem__examples" id="battle-problem-examples"></div>
      </section>

      <!-- 2행: 아바타 + VS + 점수 -->
      <section class="battle-avatars">
        <div class="battle-me">
          <div class="battle-avatar" id="me-avatar"></div>
          <div class="battle-name" id="me-name">나</div>
          <div class="battle-score" id="me-score">0</div>
        </div>

        <div class="battle-vs">
          <span class="battle-vs__divider">VS</span>
          <div class="battle-progress" id="battle-progress" aria-label="진행 도트">
            <span class="battle-progress__dot"></span>
            <span class="battle-progress__dot"></span>
            <span class="battle-progress__dot"></span>
            <span class="battle-progress__dot"></span>
            <span class="battle-progress__dot"></span>
          </div>
        </div>

        <div class="battle-opp">
          <div class="battle-avatar" id="opp-avatar">
            <span class="battle-waiting" id="opp-waiting">대기중입니다...</span>
          </div>
          <div class="battle-name" id="opp-name">상대</div>
          <div class="battle-score" id="opp-score">0</div>
        </div>
      </section>

      <!-- 3행: 코드 에디터 -->
      <section class="battle-editor code-editor-shell" aria-label="C 코드 작성">
        <div class="code-editor-shell__head">
          <span>C</span>
          <div class="code-editor-shell__actions">
            <button id="battle-reset-btn" class="code-editor-shell__btn">초기화</button>
            <button id="battle-submit-btn" class="code-editor-shell__btn code-editor-shell__btn--primary">제출</button>
          </div>
        </div>
        <div class="code-editor-shell__container" id="battle-editor-container"></div>
        <div class="code-editor-shell__loading" id="battle-editor-loading">에디터를 불러오는 중…</div>
        <textarea class="code-editor-shell__textarea" id="battle-editor-fallback" hidden spellcheck="false"></textarea>
      </section>

    </main>

    <!-- 카운트다운 오버레이 -->
    <div id="battle-countdown" class="battle-countdown" hidden>
      <span id="battle-countdown-num">3</span>
    </div>

    <!-- 결과 모달 -->
    <div id="battle-result-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <h3 id="battle-result-title">승리!</h3>
        <p id="battle-result-sub">배터리 +5</p>
        <div class="modal-actions">
          <button type="button" class="ghost" onclick="location.href='battle.html'">다시하기</button>
          <button type="button" class="cta" onclick="location.href='index.html'">나가기</button>
        </div>
      </div>
    </div>

    <!-- 제출 결과 토스트 -->
    <div id="battle-verdict-toast" class="battle-verdict-toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
    <script>
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          return (
            "data:text/javascript;charset=utf-8," +
            encodeURIComponent(
              "self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/' };" +
                "importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/base/worker/workerMain.js');"
            )
          );
        },
      };
      require.config({
        paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs" },
      });
      require(["vs/editor/editor.main"], function () {
        window.dispatchEvent(new CustomEvent("monaco-ready"));
      });
    </script>

  </body>
</html>
